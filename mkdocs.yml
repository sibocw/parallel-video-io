site_name: Parallel Video IO
site_url: https://sibocw.github.io/parallel-video-io/
repo_url: https://github.com/sibocw/parallel-video-io
repo_name: sibocw/parallel-video-io

theme:
  name: material
  features:
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            merge_init_into_class: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            show_signature_annotations: true
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage examples: examples.md
  - API Reference:
    - pvio.io: api/io.md
    - pvio.video: api/video.md
    - pvio.torch_tools: api/torch_tools.md
  - Developer Info: developer.md
